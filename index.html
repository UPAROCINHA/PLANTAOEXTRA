<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantão Extra - UPA Rocinha</title>
    <style>
        :root {
            --primary-green: #2e7d32; /* Cor diferente para diferenciar da Troca */
            --light-green: #e8f5e9;
            --bg-gray: #f4f7f9;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; padding: 15px; color: #333;
        }

        .container { 
            max-width: 750px; background: #ffffff; margin: 10px auto; padding: 30px; 
            border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-top: 8px solid var(--primary-green);
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { width: 160px; height: auto; }

        h2 { color: var(--primary-green); text-align: center; margin-bottom: 5px; font-size: 1.5em; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9em; }
        
        .section-title { 
            font-weight: bold; margin: 25px 0 10px 0; color: var(--primary-green); 
            border-bottom: 2px solid var(--light-green); font-size: 0.9em; text-transform: uppercase;
            padding-bottom: 5px;
        }

        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85em; }
        
        input, select {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            box-sizing: border-box; font-size: 14px;
        }

        .uppercase { text-transform: uppercase; }

        .colaborador-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
            align-items: center;
            background: #fafafa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
            margin-bottom: 15px;
        }

        .signature-preview {
            border: 2px solid #ddd;
            background: #fff;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85em;
            color: #444;
        }

        .signature-line { 
            font-weight: bold; 
            border-bottom: 1px solid #000; 
            width: 90%; 
            margin-bottom: 8px;
            color: #1b5e20;
            text-transform: uppercase;
        }

        .btn-submit { 
            background-color: var(--primary-green); color: white; padding: 18px; 
            border: none; border-radius: 6px; cursor: pointer; font-size: 16px; 
            font-weight: bold; width: 100%; margin-top: 20px; transition: 0.3s;
        }

        .btn-submit:hover { background-color: #1b5e20; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }

        @media (max-width: 650px) {
            .colaborador-grid, .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="logo.png" alt="Logo UPA Rocinha">
    </div>

    <h2>Solicitação de Plantão Extra</h2>
    <p class="subtitle">UPA Rocinha - Registro de Produtividade</p>

    <form id="formExtra">
        <div class="section-title">Informações do Plantão Extra</div>
        <div class="grid-3">
            <div class="form-group">
                <label>Data do Plantão*</label>
                <input type="date" id="data_plantao" required>
            </div>
            <div class="form-group">
                <label>Setor*</label>
                <select id="setor" required>
                    <option value="">Selecione...</option>
                    <option value="Consultórios">Consultórios</option>
                    <option value="Emergência / Salas Internas">Emergência / Salas Internas</option>
                    <option value="Emergência / Enfermagem">Emergência / Enfermagem</option>
                    <option value="CME">CME</option>
                    <option value="Recepção">Recepção</option>
                    <option value="Farmácia">Farmácia</option>
                    <option value="SESO">SESO</option>
                    <option value="Administração">Administração</option>
                </select>
            </div>
            <div class="form-group">
                <label>Horário*</label>
                <select id="horario" required>
                    <option value="">Selecione...</option>
                    <option value="07hs as 19hs">07hs às 19hs</option>
                    <option value="19hs as 07hs">19hs às 07hs</option>
                    <option value="24h">24h</option>
                </select>
            </div>
        </div>

        <div class="section-title">Dados do Colaborador</div>
        <div class="colaborador-grid">
            <div>
                <div class="form-group">
                    <label>Nome Completo*</label>
                    <input type="text" id="nome_colab" class="uppercase" oninput="atualizarAssinatura()" required>
                </div>
                <div class="form-group">
                    <label>Cargo*</label>
                    <input type="text" id="cargo_colab" class="uppercase" oninput="atualizarAssinatura()" required>
                </div>
                <div class="form-group">
                    <label>Matrícula*</label>
                    <input type="text" id="mat_colab" oninput="atualizarAssinatura()" required>
                </div>
            </div>
            <div class="signature-preview">
                <div class="signature-line" id="preview_nome">...</div>
                <div id="preview_detalhe" style="font-size: 0.75em;">Cargo / Mat</div>
            </div>
        </div>

        <button type="submit" id="btnSubmit" class="btn-submit">Registrar Plantão Extra</button>
    </form>
</div>

<script>
    function atualizarAssinatura() {
        document.getElementById('preview_nome').innerText = document.getElementById('nome_colab').value.toUpperCase() || "...";
        document.getElementById('preview_detalhe').innerText = (document.getElementById('cargo_colab').value.toUpperCase() || "Cargo") + " / Mat: " + (document.getElementById('mat_colab').value || "0000");
    }

    // ATENÇÃO: Substitua pela URL do seu NOVO script de Plantão Extra se for um projeto diferente
    const SCRIPT_URL = "SUA_URL_DO_APPS_SCRIPT_AQUI";

    document.getElementById('formExtra').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const payload = {
            data: document.getElementById('data_plantao').value,
            setor: document.getElementById('setor').value,
            horario: document.getElementById('horario').value,
            nome_sai: document.getElementById('nome_colab').value.toUpperCase().trim(), // Mantive nome_sai para não precisar mudar o Apps Script
            mat_sai: document.getElementById('mat_colab').value.trim(),
            cargo_sai: document.getElementById('cargo_colab').value.toUpperCase().trim(),
            nome_entra: "PLANTÃO EXTRA", // Identificador para o seu controle
            mat_entra: "N/A",
            cargo_entra: "N/A",
            assinatura_resumo: "EXTRA: " + document.getElementById('nome_colab').value.toUpperCase(),
            timestamp: new Date().toLocaleString("pt-BR")
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert('Sucesso! Solicitação de Plantão Extra registrada.');
            document.getElementById('formExtra').reset();
            atualizarAssinatura();
        })
        .catch(() => alert('Erro na conexão.'))
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "Registrar Plantão Extra";
        });
    });
</script>
</body>
</html>
